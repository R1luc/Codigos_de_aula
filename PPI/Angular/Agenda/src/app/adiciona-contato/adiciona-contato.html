<div class="container my-4" style="max-width: 700px;">
  <h2 class="mb-3">Adicionar Contato</h2>

  <form [formGroup]="contatoForm" (ngSubmit)="adicionar()" class="bg-light p-3 rounded shadow-sm">
    <div class="row g-2">
      <div class="col-12 col-md-6">
        <label class="form-label">Nome</label>
        <input class="form-control" formControlName="nome" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Telefone</label>
        <input class="form-control" formControlName="telefone" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Email</label>
        <input class="form-control" formControlName="email" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Aniversário</label>
        <input type="date" class="form-control" formControlName="aniversario" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Tipo</label>
        <select class="form-select" formControlName="tipo">
          <option *ngFor="let t of tipos" [ngValue]="t">{{ t }}</option>
        </select>
      </div>
      <div class="col-12 d-grid mt-3">
        <button class="btn btn-primary" type="submit" [disabled]="contatoForm.invalid">Adicionar</button>
      </div>
    </div>
  </form>

  <table class="table table-striped table-bordered mt-4">
    <thead class="table-light">
      <tr>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Email</th>
        <th>Aniversário</th>
        <th>Tipo</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of contatos">
        <td>{{ c.getNome() }}</td>
        <td>{{ c.getTelefone() }}</td>
        <td>{{ c.getEmail() }}</td>
        <td>{{ c.getAniversario() }}</td>
        <td>{{ c.getTipo() }}</td>
      </tr>
    </tbody>
  </table>
</div>
