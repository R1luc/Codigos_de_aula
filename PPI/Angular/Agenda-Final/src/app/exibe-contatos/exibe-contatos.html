<div class="exibe-contatos card shadow-sm rounded">
  <div class="card-body">
    <h5 class="card-title">Contatos</h5>

    @if (contatos.length === 0) {
      <div class="alert alert-info mb-0">Nenhum contato cadastrado.</div>
    } @else {

      <div class="table-responsive">
        <table class="table table-striped table-hover rounded" id="exibe-contatos-lista">
          <thead class="table-light">
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Telefone</th>
              <th>Aniversário</th>
              <th>Tipo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            @for (contato of contatos; track contato) {
              <tr >
                <td>{{ contato.nome }}</td>
                <td>{{ contato.email }}</td>
                <td>{{ contato.telefone }}</td>
                <td>{{ contato.aniversario | date:'shortDate' }}</td>
                <td>{{ contato.tipo }}</td>
                <td>
                  <button class="btn btn-sm btn-danger" (click)="removerContato(contato)">Remover</button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>

    }
  </div>
</div>
