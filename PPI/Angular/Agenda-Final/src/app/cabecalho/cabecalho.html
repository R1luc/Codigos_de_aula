<header class="cabecalho d-flex align-items-center justify-content-between px-4 py-3">

    <div class="brand d-flex align-items-center">

        <div class="logo">
            📒
        </div>

        <div class="ms-3">
            <div class="title">
                {{ title() }}
            </div>

            <div class="subtitle">
                Organize seu dia com facilidade
            </div>
        </div>

    </div>

    <div class="actions d-flex align-items-center">

        <div class="status me-3">
            <span class="dot"></span>
            Sincronizado
        </div>

        <div class="date">
            {{ currentDate }}
        </div>

    </div>

</header>
