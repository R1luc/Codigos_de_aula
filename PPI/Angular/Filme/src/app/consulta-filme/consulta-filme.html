<div class="consulta-filme card shadow-sm rounded p-3">
  <form [formGroup]="FormFilme" (ngSubmit)="pesquisarFilme()" class="needs-validation">
    <div class="mb-3 form-group">
      <label for="titulo" class="form-label">Título</label>
      <input id="titulo" class="form-control" formControlName="titulo" type="text" />
    </div>
    <div class="d-flex justify-content-end">
      <button type="submit" class="btn btn-primary">Pesquisar Filme</button>
    </div>
  </form>
</div>

<div class="exibe-filme card shadow-sm rounded">
  <div class="card-body">
    <h5 class="card-title">Filme</h5>

    @if (filme == null) {
      <div class="alert alert-info mb-0">Nenhum filme encontrado.</div>
    } @else {

      <div class="table-responsive">
        <table class="table table-striped table-hover rounded" id="exibe-filme">
          <thead class="table-light">
            <tr>
                <th>Título</th>
                <th>Ano</th>
                <th>Gênero</th>
                <th>País</th>
                <th>Poster</th>
            </tr>
          </thead>
          <tbody>
              <tr >
                <td>{{ filme.Title }}</td>
                <td>{{ filme.Year }}</td>
                <td>{{ filme.Genre }}</td>
                <td>{{ filme.Country }}</td>
                <td>
                    <img [src]="filme.Poster" width="120" alt="Poster">
                </td>
              </tr>
          </tbody>
        </table>
      </div>
    }
  </div>
</div>
