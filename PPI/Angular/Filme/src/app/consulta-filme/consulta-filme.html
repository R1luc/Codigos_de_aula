<div class="consulta-filme card shadow-sm rounded p-3">
  <form [formGroup]="FormFilme" (ngSubmit)="pesquisarFilme()">
    <div class="mb-3">
      <label for="titulo" class="form-label">Digite o Título</label>
      <input
        id="titulo"
        type="text"
        class="form-control"
        formControlName="titulo">
    </div>

    <div class="d-flex justify-content-end">
      <button type="submit" class="btn btn-primary">
        Pesquisar Filme
      </button>
    </div>
  </form>
</div>

<div class="card shadow-sm rounded mt-3">
  <div class="card-body">
    <h5 class="card-title">Resultados</h5>

    @if (filmes().length === 0) {

      <div class="alert alert-info mb-0">
        Nenhum filme encontrado.
      </div>

    } @else {

      <div class="table-responsive">
        <table class="table table-striped table-hover">

          <thead>
            <tr>
              <th>Título</th>
              <th>Ano</th>
              <th>Tipo</th>
              <th>Poster</th>
            </tr>
          </thead>

          <tbody>
            @for (filme of filmes(); track filme.imdbID) {
              <tr>
                <td>{{ filme.Title }}</td>
                <td>{{ filme.Year }}</td>
                <td>{{ filme.Type }}</td>
                <td>
                  <img
                    [src]="filme.Poster"
                    alt="{{ filme.Title }}"
                    width="100">
                </td>
              </tr>
            }
          </tbody>

        </table>
      </div>

    }

  </div>
</div>
